  SpliceAI_cutoff:
    description: 'Decision threshold applied to SpliceAI delta scores to classify
      variants as likely splice-altering. Variants with a delta score equal to or
      greater than the specified cutoff (commonly 0.2 or 0.5 depending on pipeline
      configuration) are considered to have a predicted impact on splicing. This threshold
      is defined by the analysis pipeline rather than by SpliceAI itself.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  SpliceAI_pred_DS_AG:
    description: "SpliceAI delta score predicting the probability that the variant\
      \ creates a new splice acceptor site (acceptor gain). The score ranges from\
      \ 0 to 1, where higher values indicate a higher likelihood of splice alteration.\
      \ Values \u22650.2 are often considered potentially significant, and \u2265\
      0.5 indicate strong predicted splice impact.\n"
    source: SpliceAI
    version: 1.3
    tier: 3
  SpliceAI_pred_DS_AL:
    description: 'SpliceAI delta score predicting the probability that the variant
      disrupts an existing splice acceptor site (acceptor loss). The score ranges
      from 0 to 1, with higher values indicating stronger predicted disruption of
      the native acceptor site.

      '
    source: SpliceAI
    version: 1.3
    tier: 3
  SpliceAI_pred_DS_DG:
    description: 'SpliceAI delta score predicting the probability that the variant
      creates a new splice donor site (donor gain). The score ranges from 0 to 1,
      representing the predicted probability of a novel donor splice site being introduced
      by the variant.

      '
    source: SpliceAI
    version: 1.3
    tier: 3
  SpliceAI_pred_DS_DL:
    description: 'SpliceAI delta score predicting the probability that the variant
      disrupts an existing splice donor site (donor loss). Scores range from 0 to
      1, where higher values indicate a greater predicted loss of the canonical donor
      splice site.

      '
    source: SpliceAI
    version: 1.3
    tier: 3
  SpliceAI_pred_DP_AG:
    description: 'Predicted distance in base pairs between the variant position and
      the newly created splice acceptor site (acceptor gain). Positive or negative
      values indicate the position of the predicted splice site relative to the variant
      within the transcript sequence.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  SpliceAI_pred_DP_AL:
    description: 'Predicted distance in base pairs between the variant position and
      the disrupted splice acceptor site (acceptor loss). This value indicates where
      the affected splice acceptor site is located relative to the variant position.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  SpliceAI_pred_DP_DG:
    description: 'Predicted distance in base pairs between the variant position and
      the newly created splice donor site (donor gain). The value indicates the relative
      location of the predicted donor splice site with respect to the variant.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  SpliceAI_pred_DP_DL:
    description: 'Predicted distance in base pairs between the variant position and
      the disrupted splice donor site (donor loss). Indicates the relative location
      of the canonical donor splice site predicted to be affected by the variant.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  SpliceAI_pred_SYMBOL:
    description: 'Gene symbol associated with the SpliceAI prediction. This represents
      the gene for which the splice impact prediction was calculated based on the
      transcript model used during annotation.

      '
    source: SpliceAI
    version: 1.3
    tier: 2
  REVEL:
    description: Rare Exome Variant Ensemble Learner score predicting pathogenicity
